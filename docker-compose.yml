version: "3.9"

services:
  db:
    container_name: db
    image: postgres:16
    environment:
      POSTGRES_DB: remember_me
      POSTGRES_USER: remember_me_user
      POSTGRES_PASSWORD: remember_me_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./data/schema.sql:/docker-entrypoint-initdb.d/schema.sql:Z

volumes:
  postgres_data:
