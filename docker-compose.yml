services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: remember_me
      POSTGRES_USER: remember_me_user
      POSTGRES_PASSWORD: remember_me_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./data:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d remember_me"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
